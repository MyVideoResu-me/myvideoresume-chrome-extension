<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | MyVideoResu.ME Job Tracker & AI Resume Builder</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="card">
    <h3>🔐 Login to MyVideoResu.ME</h3>
    <p class="text-sm text-muted mb-3">Sign in to access your resumes and job tracking features</p>

    <form id="loginForm">
      <div class="mb-3">
        <label for="userId" class="form-label">Email</label>
        <input type="email" id="userId" required class="form-control" placeholder="your@email.com" autocomplete="email" />
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" required class="form-control" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <div id="loginError" class="alert alert-error hidden"></div>

      <button id="login" type="submit" class="btn btn-primary">Login</button>

      <div id="loading" class="loading-container hidden">
        <div class="spinner-border" aria-hidden="true"></div>
        <span>Signing in...</span>
      </div>
    </form>

    <div class="section-divider"></div>

    <p class="text-sm text-center text-muted">
      Don't have an account?
      <a href="https://app.myvideoresu.me/login" target="_blank" rel="noopener">Create one here</a>
    </p>
  </div>

  <div class="fixed-bottom">
    <div class="float-right">
      Powered by: <a rel="noopener" href="https://myvideoresu.me" target="_blank" title="MyVideoResu.ME">
        <img src="imgs/logo.png" alt="MyVideoResu.ME" height="25" width="120">
      </a>
    </div>
  </div>

  <script src="constants.js"></script>
  <script src="login.js"></script>
</body>

</html>
